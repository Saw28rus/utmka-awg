# Канонический production-конфиг. Запускается просто: docker compose up -d --build
# Все секреты берутся ТОЛЬКО из .env (см. .env.example). Слабых дефолтов нет:
# если POSTGRES_PASSWORD не задан — compose остановится с понятной ошибкой.
# Для локальной разработки используйте ЯВНО: docker compose -f docker-compose.dev.yml up
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: utmka_awg
      POSTGRES_USER: utmka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utmka -d utmka_awg"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://utmka:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}@postgres:5432/utmka_awg
      PANEL_INSTALL_DIR: /host/utmka-awg
      PANEL_HOST_DIR: ${PANEL_HOST_DIR:-/opt/utmka-awg}
      PANEL_HEALTH_URL: http://127.0.0.1:8080/api/v1/health
    volumes:
      - panel_data:/app/data
      - ${PANEL_HOST_DIR:-/opt/utmka-awg}:/host/utmka-awg
      - /var/run/docker.sock:/var/run/docker.sock
      # CLI docker с хоста — backend запускает sibling-контейнер обновления через socket.
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  panel_data:
