# Маршрутизация 443: панель + чат по SNI, остальное — Xray Reality (TCP passthrough)
map $ssl_preread_server_name $utmka_upstream {
    {{DOMAIN}}        panel_https;
    {{CHAT_DOMAIN}}   chat_https;
    default           xray_passthrough;
}

upstream panel_https {
    server 127.0.0.1:{{PANEL_PORT}};
}

upstream chat_https {
    server 127.0.0.1:{{CHAT_PORT}};
}

upstream xray_passthrough {
    server 127.0.0.1:{{XRAY_LOCAL_PORT}};
}

server {
    listen 443;
    listen [::]:443;
    ssl_preread on;
    proxy_pass $utmka_upstream;
    proxy_timeout 1d;
}
