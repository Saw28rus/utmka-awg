# Маршрутизация 443: панель по SNI, остальное — Xray Reality (TCP passthrough)
map $ssl_preread_server_name $utmka_upstream {
    {{DOMAIN}}   panel_https;
    default      xray_passthrough;
}

upstream panel_https {
    server 127.0.0.1:8443;
}

upstream xray_passthrough {
    server 127.0.0.1:{{XRAY_LOCAL_PORT}};
}

server {
    listen 443;
    listen [::]:443;
    ssl_preread on;
    proxy_pass $utmka_upstream;
    proxy_timeout 1d;
}
