# Чат-домен: HTTP — ACME + редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    location /.well-known/acme-challenge/ {
        root {{WEBROOT}};
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Чат-домен: HTTPS, deny-by-default — наружу только mini-app и узкий client chat API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    ssl_certificate {{CERT_FULLCHAIN}};
    ssl_certificate_key {{CERT_PRIVKEY}};
    ssl_session_timeout 1d;
    ssl_session_cache shared:UTMKA_CHAT_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Узкий клиентский API чата (появится в CH2) — только этот префикс
    location /api/v1/chat/client/ {
        proxy_pass {{UPSTREAM}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Админский API, docs, openapi — никогда через чат-домен
    location /api/ { return 404; }
    location /docs { return 404; }
    location /redoc { return 404; }
    location /openapi.json { return 404; }

    # PWA: service worker должен обновляться мгновенно (без кэша)
    location = /sw.js {
        root {{CHAT_ROOT}};
        add_header Cache-Control "no-cache";
        default_type application/javascript;
    }

    # PWA: manifest с корректным типом
    location = /manifest.webmanifest {
        root {{CHAT_ROOT}};
        default_type application/manifest+json;
    }

    # Клиентский mini-app (статика)
    location / {
        root {{CHAT_ROOT}};
        index index.html;
        try_files $uri /index.html;
    }
}
