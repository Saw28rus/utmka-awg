# ВНИМАНИЕ: это конфиг ТОЛЬКО для локальной разработки (hot-reload, открытые порты,
# слабые дефолтные пароли). НИКОГДА не используйте его на сервере.
# Запуск строго с явным флагом: docker compose -f docker-compose.dev.yml up
# Production-стек — это docker-compose.yml (docker compose up -d --build).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: utmka_awg
      POSTGRES_USER: utmka
      POSTGRES_PASSWORD: utmka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utmka -d utmka_awg"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://utmka:utmka@postgres:5432/utmka_awg
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
